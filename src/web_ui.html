<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini-JV Editor</title>
<style>
  /* ---- Theme ---------------------------------------------------------- */
  :root{
    --bg:#15171c; --panel:#1d2026; --panel2:#23272f; --edge:#2e333d;
    --ink:#e8eaed; --dim:#9aa3af; --accent:#ff8a3d; --accent2:#4db1ff;
    --on:#4ade80; --off:#4b5563; --grid:#2a2f38;
    --r:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font:13px/1.35 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{display:flex;flex-direction:column;min-height:100%}
  .muted{color:var(--dim)}
  .hidden{display:none!important}

  /* ---- Header bar ----------------------------------------------------- */
  header{
    position:sticky;top:0;z-index:10;background:linear-gradient(#1b1e24,#16181d);
    border-bottom:1px solid var(--edge);padding:8px 12px;display:flex;
    flex-wrap:wrap;gap:14px;align-items:center;
  }
  .brand{font-weight:700;letter-spacing:.5px;color:var(--accent);font-size:15px}
  .brand small{color:var(--dim);font-weight:500;letter-spacing:0}
  .preset{display:flex;align-items:center;gap:6px}
  .preset .name{min-width:150px;text-align:center;background:var(--panel2);
    border:1px solid var(--edge);border-radius:var(--r);padding:5px 10px;font-weight:600}
  .preset .idx{font-variant-numeric:tabular-nums;color:var(--dim);min-width:62px;text-align:center}
  button.nav{background:var(--panel2);border:1px solid var(--edge);color:var(--ink);
    border-radius:6px;padding:5px 10px;cursor:pointer;font-size:14px}
  button.nav:hover{border-color:var(--accent)}
  .sep{width:1px;align-self:stretch;background:var(--edge)}
  #status{margin-left:auto;font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
  #dot{width:8px;height:8px;border-radius:50%;background:var(--off)}
  #dot.ok{background:var(--on)} #dot.err{background:#ef4444}

  /* ---- Generic layout ------------------------------------------------- */
  main{padding:12px;display:flex;flex-direction:column;gap:12px;max-width:920px;width:100%;margin:0 auto}
  .panel{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:10px 12px}
  .panel > h2{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);font-weight:700}
  .row{display:flex;flex-wrap:wrap;gap:10px 16px;align-items:flex-start}
  /* evenly distribute controls across the full block width */
  .fillrow{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:16px;align-items:start}
  .fillrow > *{min-width:0}
  .grid{display:grid;gap:10px 14px}

  /* ---- Control widget ------------------------------------------------- */
  .ctl{display:flex;flex-direction:column;gap:3px;min-width:96px}
  .ctl > label{font-size:10.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctl .val{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600;font-size:12px}
  .ctl .line{display:flex;align-items:center;gap:6px}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;
    background:var(--grid);outline:none;flex:1;min-width:70px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
    background:var(--accent);cursor:pointer;border:2px solid #1b1e24}
  input[type=range].signed::-webkit-slider-thumb{background:var(--accent2)}
  select,input[type=number]{background:var(--panel2);color:var(--ink);border:1px solid var(--edge);
    border-radius:6px;padding:4px 6px;font:inherit}
  input[type=number]{width:58px;font-variant-numeric:tabular-nums}
  .sw{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .sw .led{width:14px;height:14px;border-radius:50%;background:var(--off);border:1px solid #000;transition:background .1s}
  .sw.on .led{background:var(--on);box-shadow:0 0 6px rgba(74,222,128,.6)}

  /* ---- Macros (rotary knobs) ----------------------------------------- */
  #macros .row{gap:14px;justify-content:flex-start}
  #masterStack{display:flex;flex-direction:column;gap:8px}
  .knob{align-items:center;min-width:64px}
  .knob > label{text-align:center;max-width:66px}
  .knobsvg{width:46px;height:46px;cursor:ns-resize;touch-action:none}
  .knob .kbody{fill:#23272f;stroke:#2e333d;stroke-width:1}
  .knob .karc{fill:none;stroke:#3a4150;stroke-width:3}
  .knob .kval{fill:none;stroke:var(--accent2);stroke-width:3;stroke-linecap:round}
  .knob .kptr{stroke:var(--accent);stroke-width:2.5;stroke-linecap:round}

  /* ---- Tone overview strip ------------------------------------------- */
  #tones{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .tcard{background:var(--panel);border:1px solid var(--edge);border-radius:var(--r);padding:8px 10px;cursor:pointer;transition:border-color .12s,background .12s}
  .tcard:hover{border-color:var(--accent2)}
  .tcard.sel{border-color:var(--accent);background:#22262e}
  .tcard.dis{opacity:.55}
  .tcard .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .tcard .tname{font-weight:700;letter-spacing:.5px}
  .tcard .wave{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tcard .mini{display:flex;flex-direction:column;gap:4px;margin-top:6px}

  /* ---- Tone editor ---------------------------------------------------- */
  .tabs{display:flex;gap:6px;margin-bottom:10px}
  .tab{flex:1;text-align:center;padding:7px;border:1px solid var(--edge);border-radius:6px;
    background:var(--panel2);cursor:pointer;font-weight:600}
  .tab.sel{background:var(--accent);color:#16181d;border-color:var(--accent)}
  .tab.dis .tag{color:var(--dim)}
  .sections{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sections .full{grid-column:1 / -1}
  .sec{background:var(--panel2);border:1px solid var(--edge);border-radius:var(--r);padding:10px}
  .sec > h3{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent2);font-weight:700}

  /* ---- Envelope graph ------------------------------------------------- */
  .env{display:flex;flex-direction:column;gap:6px}
  .env svg{width:100%;height:96px;background:#171a1f;border:1px solid var(--edge);border-radius:6px;touch-action:none}
  .env .pts{display:flex;gap:8px;flex-wrap:wrap}
  /* Pitch/Filter/Amp: envelope (left) + sliders stacked (right) */
  .envsplit{display:grid;grid-template-columns:minmax(190px,1fr) minmax(200px,1fr);gap:14px;align-items:start}
  .envsplit .env{margin:0}
  .envsplit .env svg{height:158px}
  .envcol-r{display:flex;flex-direction:column;gap:10px}
  .envcol-r .ctl{min-width:0;width:100%}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px 12px}
  .env-node{fill:var(--accent);stroke:#16181d;stroke-width:2;cursor:grab}
  .env-node:active{cursor:grabbing}
  .env-line{fill:none;stroke:var(--accent2);stroke-width:2}
  .env-fill{fill:rgba(77,177,255,.10)}
  @media (max-width:760px){ .sections{grid-template-columns:1fr} #tones{grid-template-columns:repeat(2,1fr)} }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">MINI-JV <small>· JV-880 editor</small></div>
    <div class="sep"></div>
    <div class="preset">
      <button class="nav" id="pPrev" title="Previous patch">◀</button>
      <div class="name" id="pName">—</div>
      <button class="nav" id="pNext" title="Next patch">▶</button>
      <div class="idx" id="pIdx"></div>
    </div>
    <div class="sep"></div>
    <div id="octWrap" class="ctl" style="min-width:120px"></div>
    <div id="status"><span id="dot"></span><span id="statusText">connecting…</span></div>
  </header>

  <main>
    <section class="panel" id="masterPanel">
      <h2>Patch Common</h2>
      <div class="row" id="master"></div>
    </section>

    <section class="panel" id="macros">
      <h2>Macros · offset all tones</h2>
      <div class="fillrow" id="macroRow"></div>
    </section>

    <section>
      <div id="tones"></div>
    </section>

    <section class="panel" id="tonePanel">
      <h2>Tone Editor</h2>
      <div class="tabs" id="toneTabs"></div>
      <div class="sections" id="toneSections"></div>
    </section>
  </main>
</div>

<script>
"use strict";
(function(){
  // ===================================================================
  // Messaging — this page runs inside schwung-manager's remote-ui iframe
  // and talks to the parent window via postMessage. The parent bridges to
  // the running module over its WebSocket / shared-memory params.
  //   iframe -> parent : subscribe | getChainParams | getParam | setParam
  //   parent -> iframe : chainParams | paramUpdate | paramResult
  // Param keys are component-prefixed: "synth:<key>".
  // ===================================================================
  var PREFIX = "synth:";
  var rpcId = 0;
  var pending = {};                 // id -> resolve fn (for getParam/getChainParams)
  function post(msg){ parent.postMessage(msg, "*"); }
  function setParamRaw(key, value){ post({type:"setParam", key:PREFIX+key, value:String(value)}); }
  function rpc(type, extra){
    return new Promise(function(res){
      var id = "r"+(++rpcId); pending[id]=res;
      post(Object.assign({type:type, id:id}, extra||{}));
      // safety timeout so a missing reply never wedges boot
      setTimeout(function(){ if(pending[id]){ delete pending[id]; res(null); } }, 4000);
    });
  }

  // throttle param writes per key during drags (coalesce, always send last)
  var sendTimers = {}, sendLast = {};
  function setParam(key, value){
    state.values[key] = String(value);
    sendLast[key] = value;
    if (sendTimers[key]) return;
    setParamRaw(key, value);
    sendTimers[key] = setTimeout(function(){
      var t = sendTimers[key]; sendTimers[key]=null;
      if (sendLast[key] !== value) setParamRaw(key, sendLast[key]);
    }, 30);
  }

  // ===================================================================
  // State
  // ===================================================================
  var state = {
    params: {},        // bareKey -> metadata {key,name,type,min,max,step,options,display}
    order: [],         // bareKey[] in declared order
    values: {},        // bareKey -> string value
    activeTone: 0,
    built: false
  };
  var controls = {};   // bareKey -> {update(val)} refresh hooks (many per key allowed)
  function onValue(key, fn){ (controls[key]||(controls[key]=[])).push(fn); }
  function pushValue(key, val){
    state.values[key] = val;
    var hooks = controls[key]; if(!hooks) return;
    for (var i=0;i<hooks.length;i++){ try{ hooks[i](val); }catch(e){} }
  }

  // ===================================================================
  // Param classification (data-driven; scales as chain_params grows)
  // ===================================================================
  var TONE_RE = /^nvram_tone_(\d)_(.+)$/;
  var MACRO_KEYS = ["macro_cutoff","macro_resonance","macro_attack","macro_decay",
                    "macro_sustain","macro_release","macro_tvf_env_depth","macro_lfo_depth"];
  var MASTER_ROW1 = ["nvram_patchCommon_patchlevel","nvram_patchCommon_patchpan",
                     "nvram_patchCommon_reverblevel","nvram_patchCommon_reverbtime"];
  var MASTER_ROW2 = ["nvram_patchCommon_analogfeel","nvram_patchCommon_choruslevel",
                     "nvram_patchCommon_chorusdepth","nvram_patchCommon_chorusrate"];

  // Which tone section a per-tone suffix belongs to.
  function toneSection(suffix){
    if (/^lfo1/.test(suffix)) return "LFO 1";
    if (/^lfo2/.test(suffix)) return "LFO 2";
    if (/^(penv|pitch|randompitch)/.test(suffix)) return "Pitch";
    if (/^(tvf|cutoff|resonance|filtermode)/.test(suffix)) return "Filter";
    if (/^(tva|level|pan|drylevel|reverbsend|chorussend|bias)/.test(suffix)) return "Amp";
    if (/^(wave|fxm|toneswitch)/.test(suffix)) return "Wave";
    return "More";
  }
  // suffixes the envelope graph already covers — hidden from the numeric grid
  // (depth/velocity stay visible as plain controls).
  var ENV_TIME = {Pitch:["penvtime1","penvtime2","penvtime3","penvtime4"],
                  Filter:["tvfenvtime1","tvfenvtime2","tvfenvtime3","tvfenvtime4"],
                  Amp:["tvaenvtime1","tvaenvtime2","tvaenvtime3","tvaenvtime4"]};
  var ENV_LEVEL = {Pitch:["penvlevel1","penvlevel2","penvlevel3","penvlevel4"],
                   Filter:["tvfenvlevel1","tvfenvlevel2","tvfenvlevel3","tvfenvlevel4"],
                   Amp:["tvaenvlevel1","tvaenvlevel2","tvaenvlevel3"]};
  function isEnvSuffix(sec, suffix){
    return (ENV_TIME[sec]&&ENV_TIME[sec].indexOf(suffix)>=0) ||
           (ENV_LEVEL[sec]&&ENV_LEVEL[sec].indexOf(suffix)>=0);
  }
  var SECTION_ORDER = ["Wave","Pitch","Filter","Amp","LFO 1","LFO 2","More"];
  // Wave/Pitch/Filter/Amp span the full row; LFO 1 & LFO 2 pair up side by side.
  var SECTION_FULL = {Wave:true, Pitch:true, Filter:true, Amp:true};

  // ===================================================================
  // DOM helpers
  // ===================================================================
  function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
  function num(x){ var n=parseFloat(x); return isNaN(n)?0:n; }
  function meta(key){ return state.params[key]; }

  // Build one control bound to a param key. Returns the DOM node (or null).
  function makeControl(key, labelOverride){
    var m = meta(key); if(!m) return null;
    var wrap = el("div","ctl");
    var lab = el("label", null, labelOverride || m.name || key);
    lab.title = lab.textContent; wrap.appendChild(lab);

    if (m.type === "enum" && m.options && m.options.length){
      // boolean Off/On -> LED toggle; otherwise dropdown
      if (m.options.length === 2 && /off/i.test(m.options[0]) && /on/i.test(m.options[1])){
        var sw = el("div","sw"); sw.appendChild(el("span","led"));
        sw.appendChild(el("span",null,""));
        var refresh = function(v){ var on = num(v)>=1; sw.classList.toggle("on",on); sw.lastChild.textContent = on?"On":"Off"; };
        sw.onclick = function(){ var on = !sw.classList.contains("on"); setParam(key, on?1:0); refresh(on?1:0); };
        wrap.appendChild(sw); onValue(key, refresh); refresh(state.values[key]||0);
        return wrap;
      }
      var sel = el("select");
      m.options.forEach(function(o,i){ var op=el("option",null,o); op.value=i; sel.appendChild(op); });
      sel.onchange = function(){ setParam(key, sel.value); };
      onValue(key, function(v){ sel.value = String(num(v)); });
      sel.value = String(num(state.values[key]||0));
      wrap.appendChild(sel); return wrap;
    }

    // numeric: slider + tabular readout
    var line = el("div","line");
    var rng = el("input"); rng.type="range";
    rng.min = (m.min!=null?m.min:0); rng.max = (m.max!=null?m.max:127);
    rng.step = m.step || 1;
    if (num(m.min) < 0) rng.classList.add("signed");
    var val = el("span","val");
    var fmt = function(v){ var n=Math.round(num(v)); return (num(m.min)<0&&n>0?"+":"")+n; };
    rng.oninput = function(){ setParam(key, rng.value); val.textContent = fmt(rng.value); };
    onValue(key, function(v){ rng.value = num(v); val.textContent = fmt(v); });
    line.appendChild(rng); line.appendChild(val);
    wrap.appendChild(line);
    var iv = state.values[key]; rng.value = num(iv); val.textContent = fmt(iv);
    return wrap;
  }

  // ===================================================================
  // Rotary knob widget (macros). Drag vertically (or wheel) to change.
  // ===================================================================
  var SVGNS="http://www.w3.org/2000/svg";
  function polarTop(cx,cy,r,deg){ var a=deg*Math.PI/180; return [cx+r*Math.sin(a), cy-r*Math.cos(a)]; }
  function arcPath(r,fromDeg,toDeg){
    var a=polarTop(24,24,r,fromDeg), b=polarTop(24,24,r,toDeg), large=(toDeg-fromDeg)>180?1:0;
    return "M"+a[0].toFixed(2)+","+a[1].toFixed(2)+" A"+r+","+r+" 0 "+large+" 1 "+b[0].toFixed(2)+","+b[1].toFixed(2);
  }
  function makeKnob(key,labelOverride){
    var m=meta(key); if(!m) return null;
    var min=num(m.min!=null?m.min:0), max=num(m.max!=null?m.max:127); if(max<=min) max=min+1;
    var signed=(min<0);
    var wrap=el("div","ctl knob");
    var lab=el("label",null,labelOverride||m.name||key); lab.title=lab.textContent; wrap.appendChild(lab);
    var svg=document.createElementNS(SVGNS,"svg"); svg.setAttribute("viewBox","0 0 48 48"); svg.setAttribute("class","knobsvg");
    var body=document.createElementNS(SVGNS,"circle"); body.setAttribute("cx",24); body.setAttribute("cy",24); body.setAttribute("r",18); body.setAttribute("class","kbody"); svg.appendChild(body);
    var track=document.createElementNS(SVGNS,"path"); track.setAttribute("class","karc"); track.setAttribute("d",arcPath(15,-135,135)); svg.appendChild(track);
    var vArc=document.createElementNS(SVGNS,"path"); vArc.setAttribute("class","kval"); svg.appendChild(vArc);
    var ptr=document.createElementNS(SVGNS,"line"); ptr.setAttribute("class","kptr"); ptr.setAttribute("x1",24); ptr.setAttribute("y1",24); svg.appendChild(ptr);
    wrap.appendChild(svg);
    var val=el("span","val"); wrap.appendChild(val);
    function setVisual(v){
      var frac=(v-min)/(max-min); if(frac<0)frac=0; if(frac>1)frac=1;
      var deg=-135+frac*270, pe=polarTop(24,24,15,deg);
      ptr.setAttribute("x2",pe[0].toFixed(2)); ptr.setAttribute("y2",pe[1].toFixed(2));
      vArc.setAttribute("d",arcPath(15,-135,deg));
      val.textContent=(signed&&v>0?"+":"")+Math.round(v);
    }
    onValue(key,function(v){ setVisual(num(v)); });
    setVisual(num(state.values[key]!==undefined?state.values[key]:min));
    var dragging=false,startY=0,startV=0;
    function curV(){ return num(state.values[key]!==undefined?state.values[key]:min); }
    function down(ev){ dragging=true; startY=ev.clientY; startV=curV(); if(svg.setPointerCapture)svg.setPointerCapture(ev.pointerId); ev.preventDefault(); }
    function move(ev){ if(!dragging)return; var nv=Math.round(startV+(startY-ev.clientY)*(max-min)/150); nv=Math.max(min,Math.min(max,nv)); setParam(key,nv); setVisual(nv); }
    function up(){ dragging=false; }
    svg.addEventListener("pointerdown",down); svg.addEventListener("pointermove",move);
    svg.addEventListener("pointerup",up); svg.addEventListener("pointercancel",up);
    svg.addEventListener("wheel",function(ev){ ev.preventDefault(); var nv=Math.max(min,Math.min(max,curV()+(ev.deltaY<0?1:-1))); setParam(key,nv); setVisual(nv); },{passive:false});
    return wrap;
  }

  // ===================================================================
  // Envelope widget — graphical, draggable nodes (time = x, level = y).
  // cfg: {section, times:[keys], levels:[keys], startLevel, endLevel}
  // levels may be null (= implicit 0). Times/levels read live param ranges.
  // ===================================================================
  function makeEnvelope(toneIdx, section){
    var timeSfx = ENV_TIME[section], levSfx = ENV_LEVEL[section];
    if (!timeSfx || !levSfx) return null;
    var pre = "nvram_tone_"+toneIdx+"_";
    // resolve actual keys present
    var times = timeSfx.map(function(s){return pre+s;}).filter(function(k){return meta(k);});
    var levels = levSfx.map(function(s){return pre+s;}).filter(function(k){return meta(k);});
    if (!times.length) return null;
    var stages = Math.max(times.length, levels.length);
    // level range from metadata (filter/amp 0..127; pitch signed -63..63)
    var lm = levels.length?meta(levels[0]):null;
    var LMIN = lm?num(lm.min):0, LMAX = lm?num(lm.max):127;
    var TMAX = num((meta(times[0])||{}).max||127);
    var hasFinalZero = (section==="Amp"); // amp env decays to 0 after last stage

    var W=560, H=96, padL=6, padR=6, padT=10, padB=12;
    var ix0=padL, ix1=W-padR, iy0=padT, iy1=H-padB;
    var svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("viewBox","0 0 "+W+" "+H); svg.setAttribute("preserveAspectRatio","none");
    var fillEl = document.createElementNS("http://www.w3.org/2000/svg","path"); fillEl.setAttribute("class","env-fill");
    var lineEl = document.createElementNS("http://www.w3.org/2000/svg","path"); lineEl.setAttribute("class","env-line");
    // baseline at level=0 for signed envs
    var zeroY = (LMIN<0) ? (iy1 - ( (0-LMIN)/(LMAX-LMIN) )*(iy1-iy0)) : iy1;
    var zline = document.createElementNS("http://www.w3.org/2000/svg","line");
    zline.setAttribute("x1",ix0); zline.setAttribute("x2",ix1);
    zline.setAttribute("y1",zeroY); zline.setAttribute("y2",zeroY);
    zline.setAttribute("stroke","#2a2f38"); zline.setAttribute("stroke-dasharray","3 4");
    svg.appendChild(zline); svg.appendChild(fillEl); svg.appendChild(lineEl);

    var nodes=[];
    function levOf(i){ return levels[i]?num(state.values[levels[i]]||0):0; }
    function timeOf(i){ return num(state.values[times[i]]||0); }
    function L2Y(v){ return iy1 - ((v-LMIN)/(LMAX-LMIN))*(iy1-iy0); }
    function geom(){
      // cumulative time -> x; total includes optional final-zero segment
      var segs=stages + (hasFinalZero?1:0);
      var totalT=0, i; for(i=0;i<stages;i++) totalT+=timeOf(i);
      if(hasFinalZero) totalT+=timeOf(stages-1)*0; // final uses last time visually
      var span=ix1-ix0, n=segs; // distribute by time, min slice so points stay grabbable
      var pts=[{x:ix0,y:L2Y(LMIN<0?0:0)}]; // start
      var acc=0, denom = totalT>0?totalT:segs;
      for(i=0;i<stages;i++){ acc+=timeOf(i); var x=ix0+span*(totalT>0?acc/denom:(i+1)/segs); pts.push({x:x,y:L2Y(levOf(i))}); }
      if(hasFinalZero){ pts.push({x:ix1,y:L2Y(0)}); }
      else { pts[pts.length-1].x = ix1; }
      return pts;
    }
    function redraw(){
      var pts=geom(), d="M"+pts[0].x+","+pts[0].y, i;
      for(i=1;i<pts.length;i++) d+=" L"+pts[i].x+","+pts[i].y;
      lineEl.setAttribute("d", d);
      fillEl.setAttribute("d", d+" L"+pts[pts.length-1].x+","+iy1+" L"+pts[0].x+","+iy1+" Z");
      // The viewBox is stretched non-uniformly (preserveAspectRatio=none), so a
      // circle would render as an ellipse. Counter-scale rx/ry by the live pixel
      // ratio so the breakpoint dots stay round at any size.
      var rect=svg.getBoundingClientRect();
      var rx=rect.width>0?(6*W/rect.width):6, ry=rect.height>0?(6*H/rect.height):6;
      for(i=0;i<stages;i++){ var p=pts[i+1]; if(nodes[i]){
        nodes[i].setAttribute("cx",p.x); nodes[i].setAttribute("cy",p.y);
        nodes[i].setAttribute("rx",rx); nodes[i].setAttribute("ry",ry);
      } }
    }
    function vbX(ev){ var r=svg.getBoundingClientRect(); return (ev.clientX-r.left)/r.width*W; }
    function vbY(ev){ var r=svg.getBoundingClientRect(); return (ev.clientY-r.top)/r.height*H; }
    for(var s=0;s<stages;s++){
      (function(i){
        var c=document.createElementNS("http://www.w3.org/2000/svg","ellipse");
        c.setAttribute("class","env-node"); c.setAttribute("vector-effect","non-scaling-stroke");
        nodes[i]=c; svg.appendChild(c);
        var dragging=false, startX=0, startT=0;
        function down(ev){ dragging=true; startX=vbX(ev); startT=times[i]?timeOf(i):0;
          if(c.setPointerCapture) c.setPointerCapture(ev.pointerId); ev.preventDefault(); }
        function move(ev){
          if(!dragging) return;
          // vertical drag -> level
          if(levels[i]){
            var lv = LMAX - ((vbY(ev)-iy0)/(iy1-iy0))*(LMAX-LMIN);
            lv = Math.max(LMIN, Math.min(LMAX, Math.round(lv)));
            setParam(levels[i],lv); pushLocal(levels[i],lv);
          }
          // horizontal drag -> this stage's time (delta mapped over full width)
          if(times[i]){
            var dt = Math.round((vbX(ev)-startX)/(ix1-ix0)*TMAX);
            var tv = Math.max(0, Math.min(TMAX, startT+dt));
            setParam(times[i],tv); pushLocal(times[i],tv);
          }
          redraw();
        }
        function up(){ dragging=false; }
        c.addEventListener("pointerdown",down);
        c.addEventListener("pointermove",move);
        c.addEventListener("pointerup",up);
        c.addEventListener("pointercancel",up);
      })(s);
    }
    function pushLocal(key,v){ state.values[key]=String(v); var hk=controls[key]; if(hk)for(var j=0;j<hk.length;j++){try{hk[j](v);}catch(e){}} }

    // live refresh when values arrive from device
    times.concat(levels).forEach(function(k){ onValue(k, function(){ redraw(); }); });

    var box=el("div","env");
    box.appendChild(svg);
    setTimeout(redraw,0);
    // Redraw on size changes so the dots' counter-scaling stays correct.
    if (window.ResizeObserver){ new ResizeObserver(function(){ redraw(); }).observe(svg); }
    return box;
  }

  // ===================================================================
  // Build the whole UI from chain_params
  // ===================================================================
  function build(){
    if (state.built) return;
    state.built = true;

    // -- Octave (header) --
    var oct = makeControl("octave_transpose","Octave");
    if (oct) document.getElementById("octWrap").appendChild(oct);

    // -- Master / patch common (two rows: reverb cluster up top, chorus below) --
    var master = document.getElementById("master");
    master.className = ""; master.id = "masterStack";
    var r1=el("div","fillrow"), r2=el("div","fillrow");
    MASTER_ROW1.forEach(function(k){ var c=makeControl(k); if(c) r1.appendChild(c); });
    MASTER_ROW2.forEach(function(k){ var c=makeControl(k); if(c) r2.appendChild(c); });
    master.appendChild(r1); master.appendChild(r2);

    // -- Macros (rendered as rotary knobs — they map to the device's knobs) --
    var mrow = document.getElementById("macroRow");
    MACRO_KEYS.forEach(function(k){ var c=makeKnob(k); if(c) mrow.appendChild(c); });

    // -- Tone overview cards --
    buildToneCards();

    // -- Tone tabs --
    var tabs = document.getElementById("toneTabs");
    for (var t=0;t<4;t++){
      (function(idx){
        var b=el("div","tab"); b.id="tab"+idx;
        b.innerHTML = "Tone "+(idx+1)+' <span class="tag muted"></span>';
        b.onclick=function(){ selectTone(idx); };
        tabs.appendChild(b);
      })(t);
    }
    selectTone(0);
  }

  function buildToneCards(){
    var host=document.getElementById("tones"); host.innerHTML="";
    for (var t=0;t<4;t++){
      (function(idx){
        var pre="nvram_tone_"+idx+"_";
        var card=el("div","tcard"); card.id="tcard"+idx;
        var top=el("div","top");
        top.appendChild(el("span","tname","TONE "+(idx+1)));
        var swKey=pre+"toneswitch";
        if (meta(swKey)){
          var sw=el("span","sw"); sw.appendChild(el("span","led"));
          var rf=function(v){ var on=num(v)>=1; sw.classList.toggle("on",on); card.classList.toggle("dis",!on); };
          sw.onclick=function(ev){ ev.stopPropagation(); var on=!sw.classList.contains("on"); setParam(swKey,on?1:0); rf(on?1:0); };
          onValue(swKey,rf); rf(state.values[swKey]||0); top.appendChild(sw);
        }
        card.appendChild(top);
        var wave=el("div","wave","—");
        var wnKey=pre+"wavenumber", wgKey=pre+"wavegroup";
        function updWave(){
          var gm=meta(wgKey), g = gm && gm.options ? (gm.options[num(state.values[wgKey]||0)]||"") : "";
          wave.textContent = (g?g+" ":"") + "#" + num(state.values[wnKey]||0);
        }
        if (meta(wnKey)) onValue(wnKey,updWave);
        if (meta(wgKey)) onValue(wgKey,updWave);
        card.appendChild(wave);
        var mini=el("div","mini");
        ["level","pan"].forEach(function(s){ var c=makeControl(pre+s); if(c){c.style.minWidth="0";c.style.flex="1";mini.appendChild(c);} });
        card.appendChild(mini);
        card.onclick=function(){ selectTone(idx); };
        host.appendChild(card);
      })(t);
    }
  }

  function selectTone(idx){
    state.activeTone=idx;
    for (var t=0;t<4;t++){
      var tab=document.getElementById("tab"+t); if(tab) tab.classList.toggle("sel",t===idx);
      var card=document.getElementById("tcard"+t); if(card) card.classList.toggle("sel",t===idx);
    }
    renderToneSections(idx);
  }

  // group this tone's params by section
  function renderToneSections(idx){
    var host=document.getElementById("toneSections"); host.innerHTML="";
    var pre="nvram_tone_"+idx+"_";
    var bySec={};
    state.order.forEach(function(key){
      var m=key.match(TONE_RE); if(!m||+m[1]!==idx) return;
      var suffix=m[2], sec=toneSection(suffix);
      (bySec[sec]||(bySec[sec]=[])).push({key:key,suffix:suffix});
    });
    SECTION_ORDER.forEach(function(sec){
      var items=bySec[sec]; if(!items) return;
      var box=el("div","sec"+(SECTION_FULL[sec]?" full":"")); box.appendChild(el("h3",null,sec));
      var env=makeEnvelope(idx,sec);
      if (env){
        // Pitch/Filter/Amp: envelope on the left; sliders on the right in two
        // columns. Envelope stages are paired Tn | Ln per row using the fixed
        // ENV_TIME/ENV_LEVEL order, so alignment holds regardless of the order
        // the params arrive in.
        var split=el("div","envsplit");
        split.appendChild(env);
        var right=el("div","envcol-r");
        var tset=(ENV_TIME[sec]||[]).map(function(s){return pre+s;});
        var lset=(ENV_LEVEL[sec]||[]).map(function(s){return pre+s;});
        var envSet={}; tset.concat(lset).forEach(function(k){envSet[k]=1;});
        // non-envelope controls (depth, cutoff, mode, …) — two columns, in order
        var og=el("div","grid2");
        items.forEach(function(it){ if(envSet[it.key])return; var c=makeControl(it.key); if(c) og.appendChild(c); });
        if (og.childNodes.length) right.appendChild(og);
        // envelope stages — one row per stage: Tn (left) | Ln (right)
        var sg=el("div","grid2"), n=Math.max(tset.length,lset.length);
        for (var i=0;i<n;i++){
          sg.appendChild(meta(tset[i]) ? makeControl(tset[i],"T"+(i+1)) : el("div"));
          sg.appendChild(meta(lset[i]) ? makeControl(lset[i],"L"+(i+1)) : el("div"));
        }
        if (sg.childNodes.length) right.appendChild(sg);
        split.appendChild(right);
        box.appendChild(split);
      } else {
        // Wave: distribute full width. LFO: simple wrapping row (half-width block).
        var grid=el("div", sec==="Wave"?"fillrow":"row");
        items.forEach(function(it){ var c=makeControl(it.key); if(c) grid.appendChild(c); });
        box.appendChild(grid);
      }
      host.appendChild(box);
    });
  }

  // ===================================================================
  // Preset browser
  // ===================================================================
  function refreshPreset(){
    var idx=num(state.values["preset"]), cnt=num(state.values["preset_count"]);
    document.getElementById("pName").textContent = state.values["preset_name"] || ("Patch "+idx);
    document.getElementById("pIdx").textContent = cnt? (idx+1)+" / "+cnt : "";
  }
  function stepPreset(d){
    var idx=num(state.values["preset"]), cnt=num(state.values["preset_count"])||1;
    idx=(idx+d+cnt)%cnt; setParam("preset",idx); state.values["preset"]=String(idx); refreshPreset();
  }
  document.getElementById("pPrev").onclick=function(){ stepPreset(-1); };
  document.getElementById("pNext").onclick=function(){ stepPreset(1); };

  // ===================================================================
  // Inbound messages from parent
  // ===================================================================
  function ingestChainParams(data){
    if (!data) return;
    if (typeof data === "string"){ try{ data=JSON.parse(data); }catch(e){ return; } }
    if (!Array.isArray(data)) return;
    state.params={}; state.order=[];
    data.forEach(function(p){
      if(!p||!p.key) return;
      state.params[p.key]=p; state.order.push(p.key);
    });
    build();
  }

  function applyParamUpdate(params){
    if (!params) return;
    var touchedPreset=false;
    Object.keys(params).forEach(function(fullKey){
      var key = fullKey.indexOf(PREFIX)===0 ? fullKey.slice(PREFIX.length) : fullKey;
      pushValue(key, params[fullKey]);
      if (key==="preset"||key==="preset_name"||key==="preset_count") touchedPreset=true;
    });
    if (touchedPreset) refreshPreset();
  }

  window.addEventListener("message", function(e){
    var msg=e.data; if(!msg||!msg.type) return;
    switch(msg.type){
      case "chainParams":
        if (msg.id && pending[msg.id]){ pending[msg.id](msg.data); delete pending[msg.id]; }
        ingestChainParams(msg.data);
        break;
      case "paramResult":
        if (msg.id && pending[msg.id]){ pending[msg.id](msg.value); delete pending[msg.id]; }
        break;
      case "paramUpdate":
        applyParamUpdate(msg.params);
        break;
      case "hierarchy":
        if (msg.id && pending[msg.id]){ pending[msg.id](msg.data); delete pending[msg.id]; }
        break;
    }
  });

  function setStatus(txt, cls){
    document.getElementById("statusText").textContent=txt;
    var d=document.getElementById("dot"); d.className=cls||"";
  }

  // ===================================================================
  // Boot: subscribe, pull chain_params, then seed current values.
  // ===================================================================
  async function boot(){
    setStatus("connecting…","");
    post({type:"subscribe"});                 // start receiving paramUpdate pushes
    // Retry getChainParams a few times — the parent's chain_params arrive from
    // the device asynchronously and the iframe can boot before they land. We
    // just wait between tries (re-subscribing wouldn't re-trigger the push).
    var cp=null;
    for (var attempt=0; attempt<6 && !cp; attempt++){
      cp = await rpc("getChainParams");
      if (!cp) await new Promise(function(r){setTimeout(r,600);});
    }
    if (!cp){ setStatus("no module in slot","err"); return; }
    ingestChainParams(cp);
    setStatus("connected","ok");
    // Seed current values from the parent's cache (paramUpdate covers later changes)
    seedValues();
  }

  function seedValues(){
    // The parent forwards the device's initial value burst as paramUpdate, but
    // ONLY to an already-subscribed iframe — any batch that landed before our
    // subscribe is missed. Those values DO persist in the parent's param cache,
    // so we pull them with getParam (which reads that cache). We fetch only keys
    // not already populated by a live paramUpdate, so the work shrinks as pushes
    // arrive. preset_name/preset_count are get_param-only meta keys (absent from
    // chain_params) so they're always fetched explicitly for the browser header.
    ["preset_name","preset_count"].forEach(function(k){
      rpc("getParam",{key:PREFIX+k}).then(function(v){ if(v!=null&&v!==""){ state.values[k]=String(v); refreshPreset(); } });
    });
    var keys = state.order.slice();
    var i=0;
    function next(){
      var batch=0;
      while(i<keys.length && batch<24){
        var k=keys[i++];
        if (state.values[k]!==undefined) continue;   // already arrived via paramUpdate
        (function(k){
          rpc("getParam",{key:PREFIX+k}).then(function(v){
            if(v!=null&&v!==""){ pushValue(k,v); if(k==="preset") refreshPreset(); }
          });
        })(k);
        batch++;
      }
      if (i<keys.length) setTimeout(next, 20);
    }
    next();
  }

  boot();
})();
</script>
</body>
